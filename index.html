<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TOEFL Listening</title>

<style>
body{
margin:0;
background:black;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

video{
width:90%;
max-width:900px;
}
</style>

</head>

<body>

<video id="player" autoplay>
<source src="listening2026.mp4" type="video/mp4">
</video>

<script>

const video = document.getElementById("player");

video.controls = false;

video.addEventListener("seeking", function(){
video.currentTime = video.played.end(0);
});

</script>

</body>
</html>
